<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart Attendance Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1 style="text-align: center;">Smart Attendance Predictor</h1>

        <div class="section">
            <h2>Add New Subject</h2>
            <form id="add-subject-form">
                <label>Subject Name:</label>
                <input type="text" id="subjectName" required>
                <br><br>
                <label>Attended Classes:</label>
                <input type="number" id="attended" min="0" required>
                <br><br>
                <label>Total Classes:</label>
                <input type="number" id="total" min="1" required>
                <br><br>
                <button type="submit">Add Subject</button>
            </form>
            <div id="form-error" class="error"></div>
        </div>

        <div class="section">
            <h2>Attendance Data</h2>
            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Attended / Total</th>
                        <th>Attendance %</th>
                        <th>Status</th>
                        <th>Safe Bunk</th>
                        <th>Action Required / Warning</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Data will go here -->
                </tbody>
            </table>

            <div class="overall-section">
                <h3>Overall Attendance: <span id="overall-percentage">0%</span></h3>
                <h3>Overall Status: <span id="overall-status">N/A</span></h3>
            </div>
        </div>

        <div class="section">
            <h2>Future Prediction Simulator</h2>
            <label>Select Subject:</label>
            <select id="sim-subject">
                <option value="">-- Select --</option>
            </select>
            <br><br>
            <label>Action:</label>
            <select id="sim-action">
                <option value="bunk">Bunk</option>
                <option value="attend">Attend</option>
            </select>
            <br><br>
            <label>Number of Classes:</label>
            <input type="number" id="sim-classes" min="1" value="1">
            <br><br>
            <button id="btn-simulate">Simulate</button>

            <div id="sim-result" style="margin-top: 10px; font-weight: bold;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
