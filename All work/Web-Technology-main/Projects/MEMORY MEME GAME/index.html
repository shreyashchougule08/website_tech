<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meme Memory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>MEME MEMORY</h1>
    
    <div id="start-screen">
        <button id="start-btn">START GAME</button>
    </div>

    <div id="game-info" style="display: none;">
        <span>Time: <span id="timer">60</span>s</span> | 
        <span>Moves: <span id="move-count">0</span></span>
    </div>

    <div id="game-board" class="grid"></div>

    <div id="overlay" class="overlay">
        <h1 id="message"></h1>
        <button id="play-again-btn">PLAY AGAIN</button>
    </div>

    <audio id="snd-start" src="chaloo.mp3"></audio>
    <audio id="snd-correct" src="are-baap-re-yaad-aya.mp3"></audio>
    <audio id="snd-win-start" src="inicio-windows_keaajko.mp3"></audio>
    <audio id="snd-error" src="error_CDOxCYm.mp3"></audio>
    <audio id="snd-fail2" src="aayein-meme.mp3"></audio>
    <audio id="snd-fail3" src="abe-sale.mp3"></audio>
    <audio id="snd-fail4" src="matlab-wo-alag-hi-level-ka-banda-tha.mp3"></audio>
    <audio id="snd-msd" src="msd-dialogue.mp3"></audio>
    <audio id="snd-wow" src="anime-wow-sound-effect.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
