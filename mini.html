<!DOCTYPE html>
<html>
<head>
<title>🎬 Movie Finder</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.hero img{
  width:100%;
  height:280px;
  object-fit:cover;
}

.container{
  background:#1e293b;
  width:350px;
  margin:20px auto;
  padding:20px;
  border-radius:12px;
}

input{
  padding:10px;
  width:80%;
  border-radius:8px;
  border:none;
  margin-top:10px;
}

button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

#addSection{
  display:none;
}
</style>

</head>

<body>

<div class="hero">
  <img src="image/frontimage.jpg" alt="Movie Banner">
</div>

<div class="container">

<!-- 🔹 HORIZONTAL MENU -->
<div>
  <button onclick="showBox('movieBox')">🎬 Movie</button>
  <button onclick="showBox('animeBox')">🎌 Anime</button>
  <button onclick="showBox('otherBox')">📝 Others</button>
</div>

<hr>

<!-- 🎬 MOVIE BOX -->
<div id="movieBox">

<h2>🎬 Movie Search</h2>

<input type="text" id="searchBox" placeholder="Enter movie name"><br>
<button id="searchBtn">Search</button>

<div id="result"></div>

<h3>⭐ My Watchlist</h3>
<div id="watchlist"></div>

<div id="addSection">
  <h3>Add New Movie</h3>
  <input type="text" id="newName" placeholder="Movie name"><br>
  <input type="text" id="newInfo" placeholder="Movie info"><br>
  <button id="saveBtn">Save Movie</button>
</div>

</div>

<!-- 🎌 ANIME BOX -->
<div id="animeBox" style="display:none">

<h3>🎌 Anime Section</h3>
<input id="animeInput" placeholder="Add anime name"><br>
<button id="addAnimeBtn">Add Anime</button>
<div id="animeList"></div>

</div>

<!-- 📝 OTHERS BOX -->
<div id="otherBox" style="display:none">

<h3>📝 Others (Notepad)</h3>
<input id="noteInput" placeholder="Write note..."><br>
<button id="addNoteBtn">Add Note</button>
<div id="noteList"></div>

</div>

</div>

<script src="minibackend.js"></script>

</body>
</html>
