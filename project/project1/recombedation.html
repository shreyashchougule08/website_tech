<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Wallet</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: #f4f6f9;
        margin: 0;
    }

    .container {
        max-width: 400px;
        margin: 40px auto;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        color: #333;
    }

    .balance {
        text-align: center;
        font-size: 28px;
        margin: 15px 0;
        color: #2e8b57;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 15px;
    }

    .deposit-btn {
        background: #28a745;
        color: white;
    }

    .pay-btn {
        background: #dc3545;
        color: white;
    }

    .reset-btn {
        background: #6c757d;
        color: white;
    }

    button:hover {
        opacity: 0.9;
    }

    .history {
        margin-top: 20px;
    }

    .history h3 {
        margin-bottom: 10px;
    }

    ul {
        list-style: none;
        padding: 0;
        max-height: 150px;
        overflow-y: auto;
    }

    li {
        padding: 8px;
        margin-bottom: 5px;
        border-radius: 5px;
        display: flex;
        justify-content: space-between;
        font-size: 14px;
    }

    .credit {
        background: #d4edda;
        color: #155724;
    }

    .debit {
        background: #f8d7da;
        color: #721c24;
    }

    .msg {
        text-align: center;
        font-weight: bold;
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="container">

    <h2>💼 Smart Wallet</h2>

    <div class="balance">₹ <span id="bal">0</span></div>

    <!-- Deposit -->
    <input id="add" type="number" placeholder="Enter amount">
    <button class="deposit-btn" onclick="deposit()">Add Money</button>

    <!-- Pay -->
    <input id="name" placeholder="Enter product/service">
    <input id="pay" type="number" placeholder="Enter amount">
    <button class="pay-btn" onclick="pay()">Make Payment</button>

    <div class="msg" id="msg"></div>

    <!-- History -->
    <div class="history">
        <h3>Transaction History</h3>
        <ul id="list"></ul>
    </div>

    <button class="reset-btn" onclick="resetWallet()">Reset Wallet</button>

</div>

<script>
let bal = document.getElementById("bal");
let list = document.getElementById("list");
let msg = document.getElementById("msg");

show();

// Deposit
function deposit() {
    let amount = Number(document.getElementById("add").value);

    if (amount <= 0) {
        showMsg("Enter valid amount", "red");
        return;
    }

    let balance = Number(localStorage.getItem("balance")) || 0;
    balance += amount;
    localStorage.setItem("balance", balance);

    saveHistory("Added", amount);
    showMsg("Money Added", "green");
    show();
}

// Pay
function pay() {
    let name = document.getElementById("name").value;
    let amount = Number(document.getElementById("pay").value);
    let balance = Number(localStorage.getItem("balance")) || 0;

    if (!name || amount <= 0) {
        showMsg("Fill all fields", "red");
        return;
    }

    if (amount > balance) {
        showMsg("Insufficient Balance", "red");
        return;
    }

    balance -= amount;
    localStorage.setItem("balance", balance);

    saveHistory(name, amount);
    showMsg("Payment Successful", "green");
    show();
}

// Save history
function saveHistory(title, amount) {
    let history = JSON.parse(localStorage.getItem("history")) || [];

    history.push({
        title: title,
        amount: amount,
        type: title === "Added" ? "credit" : "debit"
    });

    localStorage.setItem("history", JSON.stringify(history));
}

// Show UI
function show() {
    bal.innerText = Number(localStorage.getItem("balance")) || 0;

    list.innerHTML = "";
    let history = JSON.parse(localStorage.getItem("history")) || [];

    history.reverse().forEach(item => {
        let li = document.createElement("li");
        li.className = item.type;

        li.innerHTML = `
            <span>${item.title}</span>
            <span>₹${item.amount}</span>
        `;

        list.appendChild(li);
    });
}

// Message
function showMsg(text, color) {
    msg.innerText = text;
    msg.style.color = color;
}

// Reset
function resetWallet() {
    localStorage.clear();
    showMsg("Wallet Reset Done", "black");
    show();
}
</script>

</body>
</html>
