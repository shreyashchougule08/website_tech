<!DOCTYPE html>
<html>
<head>
    <title>News App</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            margin: 0;
            padding: 0;
        }

        h2 {
            margin-top: 20px;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 5px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px;
            cursor: pointer;
            background: orange;
            border: none;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background: darkorange;
        }

        #news {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            color: black;
            padding: 15px;
            margin: 10px;
            width: 280px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: 0.3s;
            text-align: left;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            border-radius: 8px;
        }

        h4 {
            margin: 8px 0;
        }

        p {
            font-size: 14px;
        }

        #loading {
            font-weight: bold;
        }

        #error {
            color: yellow;
        }
    </style>
</head>

<body>

<h2>📰 News Search App</h2>

<input type="text" id="search" placeholder="Enter topic">
<button onclick="getNews()">Search</button>

<p id="error"></p>
<p id="loading"></p>

<div id="news"></div>

<script>

function getNews() {

    let query = document.getElementById("search").value;
    let error = document.getElementById("error");
    let loading = document.getElementById("loading");
    let newsDiv = document.getElementById("news");

    
    newsDiv.innerHTML = "";
    error.innerText = "";

   
    if (query == "") {
        error.innerText = "Enter topic!";
        return;
    }

    loading.innerText = "Loading...";

    setTimeout(function() {

        fetch("https://newsapi.org/v2/everything?q=" + query + "&apiKey=aa80acf8ccac4c00a3ff0f0810c0eaae")
        .then(function(res) {
            return res.json();
        })
        .then(function(data) {

            loading.innerText = "";

            let articles = data.articles;

            for (let i = 0; i < 6; i++) {

                let div = document.createElement("div");
                div.className = "card";

                div.innerHTML =
                    "<img src='" + (articles[i].urlToImage || "https://via.placeholder.com/280") + "'>" +
                    "<h4>" + articles[i].title + "</h4>" +
                    "<p>" + (articles[i].description || "No description") + "</p>";

                newsDiv.appendChild(div);
            }

        })
        .catch(function() {
            loading.innerText = "";
            error.innerText = "Error fetching news!";
        });

    }, 1000);
}

</script>

</body>
</html>
